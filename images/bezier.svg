<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Cubic Bézier curve -->
  <path d="M 12 80 C 20 10, 70 10, 88 80" fill="none" stroke="#6b8cba" stroke-width="3" stroke-linecap="round"/>
  <!-- Control point lines -->
  <line x1="12" y1="80" x2="20" y2="10" stroke="#aaa" stroke-width="1.2" stroke-dasharray="3,3"/>
  <line x1="88" y1="80" x2="70" y2="10" stroke="#aaa" stroke-width="1.2" stroke-dasharray="3,3"/>
  <!-- Anchor points -->
  <circle cx="12" cy="80" r="4" fill="#6b8cba"/>
  <circle cx="88" cy="80" r="4" fill="#6b8cba"/>
  <!-- Control points -->
  <circle cx="20" cy="10" r="3.5" fill="none" stroke="#aaa" stroke-width="1.5"/>
  <circle cx="70" cy="10" r="3.5" fill="none" stroke="#aaa" stroke-width="1.5"/>
</svg>
